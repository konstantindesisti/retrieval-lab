redis:
  url: "redis://localhost:6379"
  embedding_cache_ttl: 604800  # 7 days in seconds

# === Embedding ===
embedding_option:
  provider: "fastembed"

embedding_providers:
  # Provider options
  fastembed:
    model_name: "BAAI/bge-small-en-v1.5"

  ollama:
    model_name: "nomic-embed-text"
    host: "http://localhost:11434"

  cohere:
    model_name: "embed-multilingual-v3.0"